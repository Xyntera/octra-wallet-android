name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > octra-release.keystore
          echo "Keystore decoded successfully ($(wc -c < octra-release.keystore) bytes)"

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/octra-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: List APK output
        run: find app/build/outputs/apk -name "*.apk" | xargs ls -lh

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: octra-wallet-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
