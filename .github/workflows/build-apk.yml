name: Build Android APK

on:
  push:
    branches: [ main, master, update-webcli-2026-04-23 ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  cross-compile-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Wrapper Repository
        uses: actions/checkout@v4

      - name: Checkout webcli (upstream C++ sources)
        uses: actions/checkout@v4
        with:
          repository: octra-labs/webcli
          ref: main
          path: webcli-src

      - name: Install NDK & build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build curl tar unzip

          # Download Android NDK r26d
          NDK_VER="r26d"
          NDK_ZIP="android-ndk-${NDK_VER}-linux.zip"
          echo "Downloading NDK ${NDK_VER}..."
          curl -L "https://dl.google.com/android/repository/${NDK_ZIP}" -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d $HOME
          echo "NDK_PATH=$HOME/android-ndk-${NDK_VER}" >> $GITHUB_ENV

      - name: Cross-compile octra_wallet ARM64
        env:
          WEBCLI_DIR: ${{ github.workspace }}/webcli-src
          NDK_PATH: ${{ env.NDK_PATH }}
        run: |
          chmod +x cross_compile.sh
          ./cross_compile.sh

      - name: Verify binary
        run: |
          ls -lh app/src/main/assets/octra_wallet_arm64
          file app/src/main/assets/octra_wallet_arm64 || true

      - name: Upload native binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: octra-wallet-arm64-binary
          path: app/src/main/assets/octra_wallet_arm64
          retention-days: 7

  build-apk:
    runs-on: ubuntu-latest
    needs: cross-compile-native

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download native binary
        uses: actions/download-artifact@v4
        with:
          name: octra-wallet-arm64-binary
          path: app/src/main/assets/

      - name: Ensure binary is executable
        run: chmod +x app/src/main/assets/octra_wallet_arm64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > octra-release.keystore
            echo "Keystore decoded: $(wc -c < octra-release.keystore) bytes"
          else
            echo "No keystore secret found — will sign with debug key"
          fi

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/octra-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "octra-release.keystore" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: List APK output
        run: find app/build/outputs/apk -name "*.apk" | xargs ls -lh 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: octra-wallet-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn
